<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ürün Tanıtım</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      text-align: center;
      padding: 50px 20px 30px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #gold;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #c9a84c;
      text-transform: uppercase;
    }

    header p {
      margin-top: 10px;
      color: #aaa;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      padding: 50px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(201, 168, 76, 0.2);
      border-color: #c9a84c;
    }

    .card video {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 18px 20px;
      text-align: center;
    }

    .card-info h2 {
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #c9a84c;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #444;
      font-size: 0.85rem;
      border-top: 1px solid #1f1f1f;
    }
  </style>
</head>
<body>

  <header>
    <h1>Koleksiyon</h1>
    <p>Özel Ürün Tanıtımları</p>
  </header>

  <div class="grid">

    <div class="card">
      <video src="araba.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Araba</h2></div>
    </div>

    <div class="card">
      <video src="canta.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Çanta</h2></div>
    </div>

    <div class="card">
      <video src="parfum.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Parfüm</h2></div>
    </div>

    <div class="card">
      <video src="saat.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Saat</h2></div>
    </div>

    <div class="card">
      <video src="tesettur abiye.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Tesettür Abiye</h2></div>
    </div>

    <div class="card">
      <video src="yuzuk.mp4.mp4" autoplay muted loop playsinline></video>
      <div class="card-info"><h2>Yüzük</h2></div>
    </div>

  </div>

  <footer>
    &copy; 2026 Koleksiyon. Tüm hakları saklıdır.
  </footer>

</body>
</html>
